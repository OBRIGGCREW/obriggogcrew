<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ØB Rigg & Crew</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="nav">
    <div class="logo">ØB Rigg & Crew</div>

    <nav>
      <a href="#tjenester">Tjenester</a>
      <a href="#om">Om oss</a>
      <a href="#kontakt">Kontakt</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <h1>Vi bygger showet bak scenen</h1>
      <p>Rigg, scene og crew for events i hele Norge.</p>

      <div class="cta">
        <a href="#tjenester" class="btn primary">Tjenester</a>
        <a href="#kontakt" class="btn ghost">Kontakt</a>
      </div>
    </div>
  </section>

  <section id="tjenester" class="section">
    <h2>Tjenester</h2>

    <div class="grid">
      <div class="box">Rigging</div>
      <div class="box">Scene</div>
      <div class="box">Crew</div>
    </div>
  </section>

  <section id="om" class="section alt">
    <h2>Om oss</h2>
    <p>Vi leverer profesjonell event support i hele landet.</p>
  </section>

  <section id="kontakt" class="section">
    <h2>Kontakt</h2>
    <a class="btn primary" href="mailto:kontakt@obrigg.no">Send e-post</a>
  </section>

  <footer class="footer">
    © 2026 ØB Rigg & Crew
  </footer>

  <script src="script.js"></script>

</body>
</html>
